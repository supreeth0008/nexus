# golangci-lint v2 configuration for Nexus.
# I keep the linter set strict but pragmatic: correctness and clarity
# linters on, style bikeshedding off. The standard default set already
# includes errcheck, govet, ineffassign, staticcheck, and unused.

version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - gocritic
    - revive
  exclusions:
    rules:
      # Test files may ignore some strictness for readability.
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
